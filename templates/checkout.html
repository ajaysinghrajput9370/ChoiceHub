{% extends "base.html" %}
{% block title %}Checkout – ChoiceHub{% endblock %}
{% block content %}
<div class="checkout-wrapper">
  <h1>📍 Checkout</h1>

  <!-- Coupon Section -->
  <div id="coupon-section" style="background:#f8fafc; padding:16px; border-radius:16px; margin-bottom:20px;">
    <p><strong>Total:</strong> ₹<span id="cart-total">{{ total }}</span></p>
    <div class="coupon-input" style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
      <input type="text" id="coupon-code" placeholder="Enter coupon code" style="flex:1; min-width:150px; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:30px;">
      <button onclick="applyCoupon()" class="btn btn-primary" style="padding:10px 24px;">Apply</button>
    </div>
    <div id="coupon-result"></div>
    <input type="hidden" id="discount-amount" value="0">
    <input type="hidden" id="coupon-id" value="">
    <input type="hidden" id="net-amount" value="{{ total }}">
  </div>

  <!-- Address Form -->
  <form method="POST" id="checkout-form">
    <div class="address-form">
      <h3 style="margin-bottom:12px;">📬 Delivery Address</h3>

      <!-- Saved Addresses dropdown -->
      {% if addresses %}
      <div style="margin-bottom:16px;">
        <label style="font-weight:600;">Select saved address</label>
        <select name="address_id" id="address-select" style="width:100%; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:12px; font-size:1rem;">
          <option value="">-- Use new address --</option>
          {% for addr in addresses %}
          <option value="{{ addr.id }}">{{ addr.full_name }}, {{ addr.address_line1 }}, {{ addr.city }}, {{ addr.state }} - {{ addr.pincode }}</option>
          {% endfor %}
        </select>
      </div>
      {% endif %}

      <div id="address-fields" style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
        <div>
          <label>Full Name *</label>
          <input type="text" name="full_name" required class="form-input" placeholder="Enter full name">
        </div>
        <div>
          <label>Phone *</label>
          <input type="tel" name="phone" required class="form-input" placeholder="10-digit phone">
        </div>
        <div style="grid-column:1/-1;">
          <label>Address Line 1 *</label>
          <input type="text" name="address_line1" required class="form-input" placeholder="House / Building / Street">
        </div>
        <div style="grid-column:1/-1;">
          <label>Address Line 2 (optional)</label>
          <input type="text" name="address_line2" class="form-input" placeholder="Apartment / Floor / Sector">
        </div>
        <div>
          <label>Locality / Area *</label>
          <input type="text" name="locality" required class="form-input" placeholder="Locality name">
        </div>
        <div>
          <label>Landmark (optional)</label>
          <input type="text" name="landmark" class="form-input" placeholder="Nearby landmark">
        </div>
        <div>
          <label>City *</label>
          <input type="text" name="city" required class="form-input" placeholder="City" id="city-field">
        </div>
        <div>
          <label>State *</label>
          <input type="text" name="state" required class="form-input" placeholder="State" id="state-field">
        </div>
        <div style="grid-column:1/-1;">
          <label>Pincode *</label>
          <input type="text" name="pincode" required pattern="[0-9]{6}" class="form-input" placeholder="6-digit pincode" id="pincode-field">
        </div>
      </div>
    </div>

    <!-- Hidden fields for coupon (default values to avoid error) -->
    <input type="hidden" name="coupon_id" id="form-coupon-id" value="">
    <input type="hidden" name="discount" id="form-discount" value="0">
    <input type="hidden" name="net" id="form-net" value="{{ total }}">

    <!-- Payable & Place Order -->
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; background:#fff; padding:16px 20px; border-radius:20px; box-shadow:0 4px 20px rgba(0,0,0,0.04);">
      <div>
        <span style="font-size:1.2rem; font-weight:600;">Payable: ₹<span id="display-net">{{ total }}</span></span>
        <span style="color:#64748b; margin-left:12px;">(Cash on Delivery)</span>
      </div>
      <button type="submit" class="btn btn-gold btn-lg">📩 Place Order</button>
    </div>
  </form>
</div>

<script>
  // Coupon apply
  function applyCoupon() {
    const code = document.getElementById('coupon-code').value;
    const total = {{ total }};
    fetch('/apply-coupon', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({code: code, total: total})
    })
    .then(res => res.json())
    .then(data => {
      const result = document.getElementById('coupon-result');
      if (data.success) {
        result.innerHTML = `<p style="color:green;">✅ Discount: ₹${data.discount} | Net: ₹${data.net}</p>`;
        document.getElementById('discount-amount').value = data.discount;
        document.getElementById('coupon-id').value = data.coupon_id;
        document.getElementById('net-amount').value = data.net;
        document.getElementById('display-net').innerText = data.net;
        document.getElementById('form-coupon-id').value = data.coupon_id;
        document.getElementById('form-discount').value = data.discount;
        document.getElementById('form-net').value = data.net;
      } else {
        result.innerHTML = `<p style="color:red;">❌ ${data.message}</p>`;
      }
    });
  }

  // ─── PINCODE AUTO-FILL CITY/STATE ─────────────────────────────
  document.addEventListener('DOMContentLoaded', function() {
    const pincodeInput = document.getElementById('pincode-field');
    const cityInput = document.getElementById('city-field');
    const stateInput = document.getElementById('state-field');

    if (pincodeInput) {
      pincodeInput.addEventListener('blur', function() {
        const pincode = this.value.trim();
        if (pincode.length === 6 && /^\d{6}$/.test(pincode)) {
          // Show loading state (optional)
          cityInput.placeholder = 'Loading...';
          stateInput.placeholder = 'Loading...';
          fetch('/get-location/' + pincode)
            .then(res => res.json())
            .then(data => {
              if (data.success) {
                cityInput.value = data.city || '';
                stateInput.value = data.state || '';
                cityInput.placeholder = 'City';
                stateInput.placeholder = 'State';
              } else {
                cityInput.placeholder = 'City (not found)';
                stateInput.placeholder = 'State (not found)';
                // Optionally clear fields
                cityInput.value = '';
                stateInput.value = '';
                setTimeout(() => {
                  cityInput.placeholder = 'City';
                  stateInput.placeholder = 'State';
                }, 2000);
              }
            })
            .catch(err => {
              console.log('Error fetching location:', err);
              cityInput.placeholder = 'City (error)';
              stateInput.placeholder = 'State (error)';
            });
        }
      });
    }

    // Prefill address when saved address selected (optional AJAX)
    const addressSelect = document.getElementById('address-select');
    if (addressSelect) {
      addressSelect.addEventListener('change', function() {
        const selected = this.value;
        if (selected) {
          fetch('/get-address/' + selected)
            .then(res => res.json())
            .then(data => {
              if (data.success) {
                document.querySelector('input[name="full_name"]').value = data.address.full_name;
                document.querySelector('input[name="phone"]').value = data.address.phone;
                document.querySelector('input[name="address_line1"]').value = data.address.address_line1;
                document.querySelector('input[name="address_line2"]').value = data.address.address_line2 || '';
                document.querySelector('input[name="locality"]').value = data.address.locality || '';
                document.querySelector('input[name="landmark"]').value = data.address.landmark || '';
                document.querySelector('input[name="city"]').value = data.address.city;
                document.querySelector('input[name="state"]').value = data.address.state;
                document.querySelector('input[name="pincode"]').value = data.address.pincode;
              }
            })
            .catch(() => {});
        }
      });
    }
  });
</script>

<style>
  .checkout-wrapper { max-width:800px; margin:0 auto; padding:0 16px; }
  .address-form .form-input { width:100%; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:12px; font-size:1rem; background:#fff; transition:0.2s; }
  .address-form .form-input:focus { border-color:#b8860b; outline:none; box-shadow:0 0 0 4px rgba(184,134,11,0.08); }
  .address-form label { font-weight:600; font-size:0.9rem; display:block; margin-bottom:4px; color:#1a1a1a; }
  .coupon-input input { padding:10px 16px; border:1.5px solid #e2e8f0; border-radius:30px; font-size:1rem; }
  .coupon-input input:focus { border-color:#b8860b; outline:none; }
  .btn-gold { background:linear-gradient(145deg,#b8860b,#d4af37); color:#1a1a1a; border:none; }
  .btn-gold:hover { background:#a0750a; color:#fff; }
  @media (max-width:640px) {
    #address-fields { grid-template-columns:1fr; }
  }
</style>
{% endblock %}
