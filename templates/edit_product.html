{% extends "base.html" %}
{% block title %}Edit Product{% endblock %}
{% block content %}
<div class="admin-wrapper" style="max-width:800px; margin:0 auto;">
    <h1>✏️ Edit Product</h1>
    <form method="POST" action="/admin/edit-product/{{ product.id }}" enctype="multipart/form-data">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px; background:#fff; padding:24px; border-radius:20px; box-shadow:0 4px 20px rgba(0,0,0,0.04);">
            <div><label>Name *</label><input type="text" name="name" value="{{ product.name }}" required></div>
            <div><label>Slug</label><input type="text" name="slug" value="{{ product.slug }}"></div>
            <div><label>Category *</label><select name="category_id" required>
                {% for cat in categories %}<option value="{{ cat.id }}" {% if cat.id == product.category_id %}selected{% endif %}>{{ cat.name }}</option>{% endfor %}
            </select></div>
            <div><label>Brand</label><input type="text" name="brand" value="{{ product.brand or '' }}"></div>
            <div><label>SKU</label><input type="text" name="sku" value="{{ product.sku }}"></div>
            <div><label>Cost Price</label><input type="number" name="cost_price" step="0.01" value="{{ product.cost_price or 0 }}"></div>
            <div><label>Selling Price *</label><input type="number" name="selling_price" step="0.01" value="{{ product.selling_price }}" required></div>
            <div><label>MRP *</label><input type="number" name="mrp" step="0.01" value="{{ product.mrp }}" required></div>
            <div><label>Stock</label><input type="number" name="stock" value="{{ product.stock or 0 }}"></div>
            <div><label>Weight (kg)</label><input type="number" name="weight" step="0.01" value="{{ product.weight or '' }}"></div>
            <div><label>Dimensions</label><input type="text" name="dimensions" value="{{ product.dimensions or '' }}"></div>
            <div><label>Material</label><input type="text" name="material" value="{{ product.material or '' }}"></div>
            <div><label>Warranty</label><input type="text" name="warranty" value="{{ product.warranty or '' }}"></div>
            <div><label>Return Policy</label><input type="text" name="return_policy" value="{{ product.return_policy or '' }}"></div>
            <div><label>Video URL</label><input type="text" name="video_url" value="{{ product.video_url or '' }}"></div>
            <div><label>Care Instructions</label><input type="text" name="care_instructions" value="{{ product.care_instructions or '' }}"></div>
            <!-- delivery_time removed -->
        </div>

        <div style="background:#fff; padding:24px; border-radius:20px; box-shadow:0 4px 20px rgba(0,0,0,0.04); margin-top:14px;">
            <div><label>Short Description</label><input type="text" name="short_description" value="{{ product.short_description or '' }}"></div>
            <div><label>Description</label><textarea name="description" rows="4">{{ product.description or '' }}</textarea></div>
            <div><label>Features (one per line)</label><textarea name="features" rows="3">{{ product.features or '' }}</textarea></div>
            <div><label>Specifications (key: value per line)</label><textarea name="specifications" rows="3">{{ product.specifications or '' }}</textarea></div>
            <div><label>Images (upload new to replace)</label><input type="file" name="images" multiple accept="image/*"></div>
            <div style="display:flex; flex-wrap:wrap; gap:12px; margin:8px 0;">
                <label><input type="checkbox" name="is_featured" {% if product.is_featured %}checked{% endif %}> Featured</label>
                <label><input type="checkbox" name="is_bestseller" {% if product.is_bestseller %}checked{% endif %}> Bestseller</label>
                <label><input type="checkbox" name="is_trending" {% if product.is_trending %}checked{% endif %}> Trending</label>
                <label><input type="checkbox" name="is_new" {% if product.is_new %}checked{% endif %}> New</label>
                <label><input type="checkbox" name="free_delivery" {% if product.free_delivery %}checked{% endif %}> Free Delivery</label>
                <label><input type="checkbox" name="cod_available" {% if product.cod_available %}checked{% endif %}> COD</label>
            </div>
            <div>
                <label>Assign Seller</label>
                <select name="seller_id">
                    <option value="">Admin Product</option>
                    {% for s in sellers %}<option value="{{ s.id }}" {% if s.id == product.seller_id %}selected{% endif %}>{{ s.user.name }}</option>{% endfor %}
                </select>
            </div>
        </div>
        <div style="display:flex; gap:12px; margin-top:16px;">
            <button type="submit" class="btn btn-primary">💾 Update Product</button>
            <a href="/admin" class="btn btn-outline">↩ Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
